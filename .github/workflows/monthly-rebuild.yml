name: Monthly Hevy data rebuild

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 06:00 UTC
  workflow_dispatch:      # allow manual trigger from GitHub UI

# Least privilege: this job only POSTs to an external URL, it touches nothing
# in the repo, so the GITHUB_TOKEN gets zero permissions.
permissions: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
